openapi: 3.1.0
info:
  title: Flambeau Progresse API
  description: API pour la gestion des badges, compétences et réalisations pour les scouts Flambeaux.
  version: 1.0.0
servers:
  - url: /api

tags:
  - name: Badges
  - name: Compétences
  - name: Réalisations
  - name: Auth
  - name: Users

paths:
  /badges:
    get:
      tags: [Badges]
      summary: Liste tous les badges
      responses:
        "200":
          description: Liste des badges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Badge"

    post:
      tags: [Badges]
      summary: Crée un nouveau badge
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BadgeCreateInput"
      responses:
        "201":
          description: Badge créé
        "401":
          description: Non authentifié
        "409":
          description: Numéro de badge déjà existant

  /badges/{id}:
    get:
      tags: [Badges]
      summary: Récupère les détails d'un badge
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Détails du badge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Badge"
        "404":
          description: Badge non trouvé

    patch:
      tags: [Badges]
      summary: Met à jour un badge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BadgeUpdateInput"
      responses:
        "200":
          description: Badge mis à jour
        "404":
          description: Badge non trouvé

    delete:
      tags: [Badges]
      summary: Supprime un badge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Badge supprimé
        "404":
          description: Badge non trouvé

  /users:
    get:
      tags: [Users]
      summary: Liste tous les utilisateurs
      description: Seuls les ADMIN et REFERENT peuvent accéder à cette ressource
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liste des utilisateurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          description: Non authentifié
        "403":
          description: Accès non autorisé

  /users/{id}/role:
    get:
      tags: [Users]
      summary: Récupère les informations d'un utilisateur
      description: Seuls les ADMIN et REFERENT peuvent accéder à cette ressource
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Informations de l'utilisateur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Non authentifié
        "403":
          description: Accès non autorisé
        "404":
          description: Utilisateur non trouvé

    patch:
      tags: [Users]
      summary: Modifie le rôle d'un utilisateur
      description: Seuls les ADMIN peuvent modifier les rôles
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleUpdateInput"
      responses:
        "200":
          description: Rôle mis à jour
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Données invalides
        "401":
          description: Non authentifié
        "403":
          description: Accès non autorisé
        "404":
          description: Utilisateur non trouvé

  /competences/progress:
    get:
      tags: [Compétences]
      summary: Récupère les progressions d'un utilisateur
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Map des progressions de l'utilisateur
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/CompetenceProgress"
        "401":
          description: Non authentifié

    post:
      tags: [Compétences]
      summary: Sauvegarde ou met à jour une progression
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompetenceProgressInput"
      responses:
        "200":
          description: Progression sauvegardée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCompetenceProgress"
        "400":
          description: Données invalides
        "401":
          description: Non authentifié
        "404":
          description: Compétence non trouvée

  /auth/signup:
    post:
      tags: [Auth]
      summary: Crée un nouvel utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupInput"
      responses:
        "201":
          description: Utilisateur créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Données invalides
        "409":
          description: Email déjà utilisé

  /auth/signin:
    post:
      tags: [Auth]
      summary: Authentifie un utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SigninInput"
      responses:
        "200":
          description: JWT renvoyé
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Données invalides
        "401":
          description: Identifiants invalides

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Badge:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        number:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        image_src:
          type: string
          nullable: true
        competences:
          type: array
          items:
            $ref: "#/components/schemas/Competence"
        realisations:
          type: array
          items:
            $ref: "#/components/schemas/Realisation"

    BadgeCreateInput:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        number:
          type: string
          nullable: true
        description:
          type: string
        image_src:
          type: string
          nullable: true
        competences:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
        realisations:
          type: array
          items:
            type: object
            properties:
              description:
                type: string

    BadgeUpdateInput:
      allOf:
        - $ref: "#/components/schemas/BadgeCreateInput"

    Competence:
      type: object
      properties:
        id:
          type: integer
        badge_id:
          type: integer
        description:
          type: string

    Realisation:
      type: object
      properties:
        id:
          type: integer
        badge_id:
          type: integer
        description:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [ADMIN, CHEF, REFERENT]

    RoleUpdateInput:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [ADMIN, CHEF, REFERENT]

    CompetenceProgress:
      type: object
      properties:
        isCompleted:
          type: boolean
        completedAt:
          type: string
          format: date-time
          nullable: true

    CompetenceProgressInput:
      type: object
      required: [competenceId, isCompleted]
      properties:
        competenceId:
          type: integer
        isCompleted:
          type: boolean

    UserCompetenceProgress:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        competenceId:
          type: integer
        isCompleted:
          type: boolean
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SignupInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string

    SigninInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
